<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Management</title>

<link rel="stylesheet" href="restaurant.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="header">

<h2>🏪 Restaurant Management</h2>

<a href="dashboard.html">⬅ Dashboard</a>

</header>

<div class="container">

<div class="card">

<h3>Add Restaurant</h3>

<label>Restaurant Name</label>
<input type="text" id="restaurantName" placeholder="Pizza Hub">

<label>Restaurant Address</label>
<input type="text" id="restaurantAddress" placeholder="Sahpau, Hathras">

<label>Delivery Time</label>
<input type="text" id="deliveryTime" placeholder="25 Min">

<label>Rating</label>
<input type="number" id="rating" placeholder="4.8" step="0.1">

<label>Restaurant Image</label>
<input type="file" id="restaurantImage" accept="image/*">

<img id="preview" src="https://via.placeholder.com/350x200?text=Restaurant+Preview">

<button id="addRestaurantBtn">
➕ Add Restaurant
</button>

</div>

</div>

<script src="restaurant.js"></script>

</body>

  </html>
